# Helm values for rconman — authenticated web UI for RCON server management.
# See docs/helm-publishing.md for installation instructions.

replicaCount: 1

image:
  repository: ghcr.io/your-org/rconman
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""

networkPolicy:
  enabled: false
  ingress: []

gateway:
  enabled: false
  parentRef:
    name: ""
    namespace: ""
    sectionName: ""

config:
  server:
    baseURL: "https://rconman.example.com"
    insecureMode: false
    sessionExpiry: "24h"
  log:
    level: "info"
    format: "json"
  store:
    path: "/data/rconman.db"
    retention: "30d"
  auth:
    oidc:
      # OIDC provider discovery URL — must expose /.well-known/openid-configuration
      # Google:   https://accounts.google.com
      # Dex:      https://dex.example.com
      # Keycloak: https://keycloak.example.com/realms/<realm>
      # Authelia: https://auth.example.com
      issuerURL: "https://accounts.google.com"
      # Client ID and secret are set via secrets.oidcClientID / secrets.oidcClientSecret below
      scopes:
        - openid
        - email
        - profile
    admin:
      claim:
        # Claim in the ID token used to identify admins
        # Common values: "email", "groups", "roles"
        name: "email"
        # Value the claim must equal for the user to be granted admin access
        value: "admin@example.com"
      # emailAllowlist restricts login to specific email addresses (optional)
      # emailAllowlist:
      #   - "admin@example.com"
  minecraft:
    servers:
      - id: "my-server"
        name: "My Minecraft Server"
        rcon:
          host: "minecraft.example.com"
          port: 25575
        statusPollInterval: "30s"
        # commands:
        #   - category: "Player Management"
        #     templates:
        #       - name: "Kick Player"
        #         description: "Kick a player from the server"
        #         command: "kick <player> <reason>"
        #         params:
        #           - name: player
        #             type: string
        #           - name: reason
        #             type: string
        #             default: "Kicked by admin"

# Secrets — choose ONE approach per sensitive field:
#   Option A: value      — store inline (dev/demo only)
#   Option B: existingSecret — reference a K8s Secret you already manage
#   Option C: valueFrom.env  — env var injected by the StatefulSet (default)
#   Option D: valueFrom.file — mounted secret file

secrets:
  sessionSecret:
    # Option A: chart-managed — set value here, chart creates the K8s Secret
    # value: "your-32-byte-minimum-secret-here"
    #
    # Option B: reference an existing K8s Secret
    # existingSecret:
    #   name: "my-existing-secret"
    #   key: "session-secret"
    #
    # Option C: env var — default; set the K8s Secret value via Option A or B
    valueFrom:
      env: RCONMAN_SESSION_SECRET
    #
    # Option D: file mount
    # valueFrom:
    #   file: /run/secrets/session-secret

  oidcClientID:
    # Option A: chart-managed
    # value: "your-client-id"
    #
    # Option B: reference an existing K8s Secret
    # existingSecret:
    #   name: "my-oidc-secret"
    #   key: "client-id"
    #
    # Option C: env var (default)
    valueFrom:
      env: RCONMAN_OIDC_CLIENT_ID
    #
    # Option D: file mount
    # valueFrom:
    #   file: /run/secrets/oidc-client-id

  oidcClientSecret:
    # Option A: chart-managed
    # value: "your-client-secret"
    #
    # Option B: reference an existing K8s Secret
    # existingSecret:
    #   name: "my-oidc-secret"
    #   key: "client-secret"
    #
    # Option C: env var (default)
    valueFrom:
      env: RCONMAN_OIDC_CLIENT_SECRET
    #
    # Option D: file mount
    # valueFrom:
    #   file: /run/secrets/oidc-client-secret

  minecraft:
    servers:
      - id: "my-server"
        rconPassword:
          # Option A: chart-managed
          # value: "my-rcon-password"
          #
          # Option B: reference an existing K8s Secret (most common for existing servers)
          # existingSecret:
          #   name: "my-minecraft-secret"
          #   key: "rcon-password"
          #
          # Option C: env var (default)
          valueFrom:
            env: RCONMAN_MINECRAFT_MY_SERVER_RCON_PASSWORD
          #
          # Option D: file mount
          # valueFrom:
          #   file: /run/secrets/minecraft-rcon-password
