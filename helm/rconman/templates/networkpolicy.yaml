{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rconman.fullname" . }}
  labels:
    {{- include "rconman.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rconman.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
      {{- if .Values.networkPolicy.ingress }}
      from:
      {{- range .Values.networkPolicy.ingress }}
        - {{- if .namespaceSelector }}
          namespaceSelector:
            {{- toYaml .namespaceSelector | nindent 12 }}
          {{- end }}
          {{- if .podSelector }}
          podSelector:
            {{- toYaml .podSelector | nindent 12 }}
          {{- end }}
      {{- end }}
      {{- end }}
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # External HTTPS (OIDC provider)
    - ports:
        - port: 443
          protocol: TCP
    {{- range .Values.minecraft.servers }}
    {{- if .networkPolicy }}
    # RCON egress for server: {{ .name }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .networkPolicy.namespace | quote }}
          podSelector:
            {{- toYaml .networkPolicy.podSelector | nindent 12 }}
      ports:
        - port: {{ .rcon.port }}
          protocol: TCP
    {{- end }}
    {{- end }}
{{- end }}
